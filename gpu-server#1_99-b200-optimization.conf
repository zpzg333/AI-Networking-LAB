
hsy@b200-1-20260721-102549 ~ ❯ cat /etc/sysctl.d/99-b200-optimization.conf 
# ============================================================================
# 1. ECMP 라우팅 최적화 (8-way multipath)
# ============================================================================
# ECMP 해시 정책: L4 기반 (source/dest IP + port)
# 0 = L3 only (IP)
# 1 = L4 (IP + port, 권장)
# 2 = L3 + L4 + flow label (IPv6)
net.ipv4.fib_multipath_hash_policy = 1

# ECMP 경로 선택 시 neighbor reachability 고려 (권장: 1)
net.ipv4.fib_multipath_use_neigh = 1

# 라우팅 테이블 크기 증가 (ECMP 라우트 많을 때)
net.ipv4.route.max_size = 8388608
net.ipv6.route.max_size = 8388608

# 라우팅 캐시 GC 임계값 (많은 플로우 처리)
net.ipv4.route.gc_thresh = 262144
net.ipv4.route.gc_min_interval = 5
net.ipv4.route.gc_timeout = 300

# ============================================================================
# 2. 네트워크 버퍼 크기 (RoCEv2 + 3.2Tbps 최적화)
# ============================================================================
# *** UDP 버퍼 (RoCEv2 핵심!) ***
# RoCEv2는 UDP 기반이므로 매우 크게 설정
# BDP = Bandwidth(400Gbps) × RTT(100us) × 8 links ≈ 400MB
# 안전 마진 포함: 512MB - 1GB - 2GB
net.core.rmem_max = 1073741824          # 1GB (이전: 256MB)
net.core.wmem_max = 1073741824          # 1GB
net.core.rmem_default = 268435456       # 256MB (이전: 64MB)
net.core.wmem_default = 268435456       # 256MB

# UDP 메모리 풀 (페이지 단위: min, pressure, max)
# 400G x 8 = 3.2Tbps → 매우 공격적으로 증가
net.ipv4.udp_mem = 268435456 536870912 1073741824  # 256MB, 512MB, 1GB (이전: 128/256/512MB)
net.ipv4.udp_rmem_min = 262144          # 256KB (이전: 128KB)
net.ipv4.udp_wmem_min = 262144          # 256KB

# *** TCP 버퍼 (관리 트래픽 및 K8s API) ***
# min, default, max
net.ipv4.tcp_rmem = 8192 262144 536870912  # 512MB (이전: 128MB)
net.ipv4.tcp_wmem = 8192 262144 536870912  # 512MB
net.ipv4.tcp_mem = 268435456 536870912 1073741824  # 1GB

# ============================================================================
# 3. RoCEv2 ECN (Explicit Congestion Notification)
# ============================================================================
# ECN 활성화 (RoCEv2 PFC 대신 ECN 사용 권장)
# 0 = 비활성화
# 1 = 수신만 (passive)
# 2 = 송수신 (active, 권장)
# 3 = 강제 (fallback to passive if peer doesn't support)
net.ipv4.tcp_ecn = 2
net.ipv4.tcp_ecn_fallback = 1

# ECN for UDP (RoCEv2)
# Note: RoCEv2 ECN은 주로 RDMA 스택에서 처리되지만 커널 지원 필요
# /sys/class/infiniband/mlx5_*/tc/1/traffic_class 에서도 설정

# ============================================================================
# 4. 네트워크 큐 크기 (400G x 8 NIC 최적화)
# ============================================================================
# RX/TX 큐 백로그 (3.2Tbps → 매우 크게)
net.core.netdev_max_backlog = 1000000   # 100만 (이전: 50만)
net.core.netdev_budget = 1200           # 1200 (이전: 1000)
net.core.netdev_budget_usecs = 12000    # 12ms (이전: 8ms)

# 소켓 리스닝 큐
net.core.somaxconn = 131072             # 128K (이전: 64K)
net.core.optmem_max = 268435456         # 256MB

# RPS/RFS (Receive Packet Steering/Flow Steering)
# 8 NIC × 다수 RSS 큐 → 많은 플로우
net.core.rps_sock_flow_entries = 262144  # 256K (이전: 32K)

# Flow limit (플로우당 큐 제한)
net.core.flow_limit_cpu_bitmap = ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff,ffffffff
net.core.flow_limit_table_len = 8192

# ============================================================================
# 5. TCP 최적화 (관리 트래픽 + K8s API)
# ============================================================================
# TCP 혼잡 제어: BBR (낮은 레이턴시) 또는 CUBIC (안정성)
# BBR은 낮은 RTT 환경에서 유리하지만 RoCEv2 환경에서는 CUBIC이 더 안전
net.ipv4.tcp_congestion_control = cubic

# TCP Window Scaling (대용량 BDP)
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_moderate_rcvbuf = 1

# TCP Timestamps (RTT 측정)
net.ipv4.tcp_timestamps = 1

# SACK (Selective ACK)
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_fack = 1

# TCP Fast Open (추론 서비스 레이턴시 감소)
net.ipv4.tcp_fastopen = 3

# MTU Probing (Jumbo Frame 자동 발견)
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_base_mss = 1024

# TCP 메트릭 캐싱 비활성화 (동적 환경)
net.ipv4.tcp_no_metrics_save = 1

# ============================================================================
# 6. ARP 캐시 (멀티 NIC + ECMP 환경)
# ============================================================================
# 8 NIC × 다수 엔드포인트 → ARP 테이블 증가
net.ipv4.neigh.default.gc_thresh1 = 16384   # (이전: 8192)
net.ipv4.neigh.default.gc_thresh2 = 32768   # (이전: 16384)
net.ipv4.neigh.default.gc_thresh3 = 65536   # (이전: 32768)
net.ipv4.neigh.default.gc_interval = 30
net.ipv4.neigh.default.gc_stale_time = 120
net.ipv4.neigh.default.base_reachable_time_ms = 30000

# IPv6 Neighbor Cache (향후 대비)
net.ipv6.neigh.default.gc_thresh1 = 16384
net.ipv6.neigh.default.gc_thresh2 = 32768
net.ipv6.neigh.default.gc_thresh3 = 65536

# ============================================================================
# 7. IP Fragment 처리 (Jumbo Frame MTU 9000)
# ============================================================================
# Fragment 버퍼 크기 증가
net.ipv4.ipfrag_high_thresh = 16777216   # 16MB (이전: 8MB)
net.ipv4.ipfrag_low_thresh = 12582912    # 12MB (이전: 6MB)
net.ipv4.ipfrag_time = 30
net.ipv4.ipfrag_max_dist = 64

# IPv6 Fragment
net.ipv6.ip6frag_high_thresh = 16777216
net.ipv6.ip6frag_low_thresh = 12582912
net.ipv6.ip6frag_time = 30

# ============================================================================
# 8. Multicast (NCCL All-Reduce)
# ============================================================================
net.ipv4.igmp_max_memberships = 1024     # (이전: 512)
net.ipv4.igmp_max_msf = 512
net.ipv4.igmp_qrv = 2

# ============================================================================
# 9. TCP Keep-Alive (컨테이너 연결 유지)
# ============================================================================
net.ipv4.tcp_keepalive_time = 600        # 10분
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 15

# ============================================================================
# 10. IPC (Inter-Process Communication) - GPU 통신 최적화
# ============================================================================
# Shared Memory (NCCL IPC)
kernel.shmmax = 68719476736              # 64GB
kernel.shmall = 16777216                 # 64GB / 4KB
kernel.shmmni = 8192                     # (이전: 4096)

# Semaphore
kernel.sem = 250 256000 32 2048          # (이전: 1024)

# Message Queue
kernel.msgmnb = 131072                   # 128KB (이전: 64KB)
kernel.msgmax = 131072                   # 128KB
kernel.msgmni = 8192

# ============================================================================
# 11. 파일 디스크립터 및 프로세스 제한
# ============================================================================
fs.file-max = 4194304                    # 400만 (이전: 200만)
kernel.pid_max = 4194304
fs.nr_open = 4194304

# Inotify (K8s 많은 파일 감시)
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288

# ============================================================================
# 12. 메모리 관리 (2.2TiB RAM 최적화)
# ============================================================================
# Swappiness (GPU 메모리 페이징 방지)
vm.swappiness = 1                        # (이전: 10, AI 워크로드는 더 낮게)

# Dirty Page (대용량 I/O)
vm.dirty_ratio = 10                      # (이전: 15, SSD 환경)
vm.dirty_background_ratio = 3            # (이전: 5)
vm.dirty_writeback_centisecs = 500
vm.dirty_expire_centisecs = 3000

# VFS 캐시 압력 (대용량 메모리)
vm.vfs_cache_pressure = 50

# Memory Overcommit (AI 워크로드)
vm.overcommit_memory = 1                 # 항상 허용
vm.overcommit_ratio = 95

# Transparent Huge Pages (NCCL 최적화)
# Note: /sys/kernel/mm/transparent_hugepage/enabled = madvise 권장
vm.nr_hugepages = 0                      # THP 사용 시 동적 할당

# Memory Map (대규모 메모리 매핑)
vm.max_map_count = 524288                # (이전: 262144)

# Memory Zone Reclaim (NUMA)
vm.zone_reclaim_mode = 0                 # NUMA 간 메모리 사용 허용

# ============================================================================
# 13. NUMA 최적화 (6 NUMA nodes)
# ============================================================================
# NUMA Balancing 비활성화 (RDMA locality 중요)
kernel.numa_balancing = 0

# ============================================================================
# 14. Scheduler 설정 (384 cores 최적화)
# ============================================================================
# Migration Cost (코어 간 이동 비용)
kernel.sched_migration_cost_ns = 5000000

# Autogroup 비활성화 (HPC 워크로드)
kernel.sched_autogroup_enabled = 0

# Scheduler Tuning (낮은 레이턴시)
kernel.sched_latency_ns = 10000000       # 10ms
kernel.sched_min_granularity_ns = 1000000  # 1ms
kernel.sched_wakeup_granularity_ns = 2000000  # 2ms

# CFS Bandwidth (컨테이너 CPU 제한)
kernel.sched_cfs_bandwidth_slice_us = 5000

# ============================================================================
# 15. RoCE 특화 설정
# ============================================================================
# Busy Poll (낮은 레이턴시, CPU 사용량 증가 주의)
# NCCL 레이턴시 민감한 경우 활성화
net.core.busy_poll = 50
net.core.busy_read = 50

# GRO/GSO (Generic Receive/Send Offload)
# Note: ethtool로도 설정 필요
# net.core.gro_normal_batch = 8

# ============================================================================
# 16. K8s 환경 최적화 (LLM 학습 + 추론)
# ============================================================================
# Connection Tracking (K8s Service 많은 연결)
net.netfilter.nf_conntrack_max = 4194304  # 400만 (이전: 200만)
net.nf_conntrack_max = 4194304

# Conntrack 테이블 크기 (buckets = max / 4)
net.netfilter.nf_conntrack_buckets = 1048576  # 100만 (이전: 50만)

# Conntrack 타임아웃 (빠른 재사용)
net.netfilter.nf_conntrack_tcp_timeout_established = 86400  # 24시간
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 60
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 30

# Conntrack UDP 타임아웃 (RoCEv2)
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 180

# 로컬 포트 범위 (많은 컨테이너 Pod)
net.ipv4.ip_local_port_range = 10000 65535  # (이전: 15000-65535, 더 넓게)

# TIME_WAIT 소켓 재사용 (추론 서비스 높은 동시성)
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# SYN backlog (추론 서비스 많은 동시 연결)
net.ipv4.tcp_max_syn_backlog = 16384     # (이전: 8192)

# SYN cookies (SYN flood 방어)
net.ipv4.tcp_syncookies = 1

# TCP 재전송 최적화
net.ipv4.tcp_retries2 = 8
net.ipv4.tcp_orphan_retries = 3
net.ipv4.tcp_syn_retries = 3
net.ipv4.tcp_synack_retries = 3

# Bridge 네트워크 (K8s CNI - Calico/Cilium)
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.bridge.bridge-nf-call-arptables = 1
net.bridge.bridge-nf-filter-vlan-tagged = 0

# ============================================================================
# 17. IPv6 설정 (향후 대비)
# ============================================================================
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.default.forwarding = 0
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.disable_ipv6 = 0       # IPv6 활성화 (필요 시)

# ============================================================================
# 18. 보안 설정 (프로덕션 환경)
# ============================================================================
# IP Forwarding (K8s는 활성화 필요, 일반 서버는 비활성화)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# ICMP 설정
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Source Route 비활성화 (보안)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# RP Filter (역방향 경로 필터링)
# ECMP 환경에서는 2 (loose mode) 권장
net.ipv4.conf.all.rp_filter = 2          # (이전: 1, ECMP 지원)
net.ipv4.conf.default.rp_filter = 2

# Accept Redirects 비활성화
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Send Redirects 비활성화
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# ============================================================================
# 19. 커널 성능 튜닝
# ============================================================================
# Watchdog (대규모 병렬 작업)
kernel.watchdog_thresh = 30
kernel.soft_watchdog = 1
kernel.nmi_watchdog = 1

# Panic 동작
kernel.panic = 10                        # 10초 후 재부팅
kernel.panic_on_oops = 1

# Core dump
kernel.core_uses_pid = 1
kernel.core_pattern = /var/crash/core-%e-%p-%t

# Printk (커널 로그)
kernel.printk = 4 4 1 7
kernel.printk_ratelimit = 5
kernel.printk_ratelimit_burst = 10

# ============================================================================
# 20. GPU Direct RDMA 최적화
# ============================================================================
# Ptrace (nvidia-peermem 모듈)
kernel.yama.ptrace_scope = 0

# Perf Event (프로파일링)
kernel.perf_event_paranoid = -1
kernel.perf_event_max_sample_rate = 100000

# ============================================================================
# 21. 네트워크 디버깅 (필요 시 활성화)
# ============================================================================
# Netfilter 로깅
# net.netfilter.nf_log.2 = nf_log_ipv4

# TCP 디버깅
# net.ipv4.tcp_debug = 1

# ============================================================================
# 22. 추가 네트워크 최적화
# ============================================================================
# 최대 동시 연결 수 (Open Files와 관련)
fs.file-max = 4194304

# Socket 버퍼 재사용
net.ipv4.tcp_abort_on_overflow = 0

# TCP Slow Start (Restart after Idle)
net.ipv4.tcp_slow_start_after_idle = 0

# TCP Autocorking
net.ipv4.tcp_autocorking = 1

# TCP Thin Streams (낮은 레이턴시)
net.ipv4.tcp_thin_linear_timeouts = 0
net.ipv4.tcp_thin_dupack = 0

# MTU Discovery Blackhole Detection
net.ipv4.tcp_mtu_probe_floor = 536

